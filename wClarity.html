<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <header>
    <div class="header-left">
      <div class="logo-mark" aria-hidden="true"><i class="fa-solid fa-bolt"></i></div>
      <div>
        <div class="header-title">Chat</div>
        <div class="header-subtitle">local assistant</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="clearBtn" title="Clear conversation" aria-label="Clear conversation">
        <i class="fa-solid fa-arrow-rotate-left"></i>
      </button>
    </div>
  </header>

  <main class="messages" id="messages" role="log" aria-live="polite" aria-label="Chat messages">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon"><i class="fa-regular fa-message"></i></div>
      <div class="empty-title">Start a conversation</div>
      <div class="empty-desc">Send a message to begin chatting with your local AI assistant.</div>
      <div class="suggestions">
        <button class="suggestion-chip" data-msg="Explain quantum computing simply">Quantum computing</button>
        <button class="suggestion-chip" data-msg="Write a short poem about the night sky">Write a poem</button>
        <button class="suggestion-chip" data-msg="What are the best practices for REST APIs?">REST API tips</button>
      </div>
    </div>
  </main>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="chatInput" rows="1" placeholder="Message..." aria-label="Type your message"></textarea>
      <button class="send-btn" id="sendBtn" disabled aria-label="Send message">
        <i class="fa-solid fa-arrow-up"></i>
      </button>
    </div>
    <div class="input-hint">Press Enter to send, Shift+Enter for new line</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="script.js"></script>
</body>
</html>
